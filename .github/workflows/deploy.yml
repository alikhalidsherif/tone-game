name: Deploy to Homelab Server

on:
  push:
    branches: [ main ] # Or your primary branch

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build -t tonematch-image:${{ github.sha }} .

      - name: Stop and Remove Old Container
        run: |
          if [ $(docker ps -aq -f name=tonematch-container) ]; then
            docker stop tonematch-container
            docker rm tonematch-container
          fi

      - name: Run New Container
        run: |
          # Use absolute path for data volume mount based on github workspace
          docker run -d \
            --name tonematch-container \
            --restart unless-stopped \
            --network npm-network \
            -p 8080:3001 \
            -v ${{ github.workspace }}/data:/app/data \
            tonematch-image:${{ github.sha }}

      - name: Prune Old Images
        run: docker image prune -a -f
