name: Deploy to Homelab Server

on:
  workflow_dispatch: 
  push:
    branches: [ main ] # Or your primary branch

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Cleanup Workspace
        run: |
          # Use docker to cleanup files that might be owned by root from previous runs
          docker run --rm -v ${{ github.workspace }}:/workspace alpine sh -c "rm -rf /workspace/* /workspace/.* || true"

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t tonematch-image:${{ github.sha }} .

      - name: Stop and Remove Old Container
        run: |
          if [ $(docker ps -aq -f name=tonematch-container) ]; then
            docker stop tonematch-container
            docker rm tonematch-container
          fi

      - name: Run New Container
        run: |
          # Use named volume for data persistence to avoid permission issues in workspace
          docker run -d \
            --name tonematch-container \
            --restart unless-stopped \
            --network npm-network \
            -p 8080:3001 \
            -v tonematch-data:/app/data \
            tonematch-image:${{ github.sha }}

      - name: Prune Old Images
        run: docker image prune -a -f
